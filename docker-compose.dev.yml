version: '3.9'

networks:
  bhackme-net:
    driver: bridge
  terminal-net:
    driver: bridge
    internal: true

volumes:
  postgres-data:
  redis-data:

services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bhackme-frontend-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=ws://localhost:4000
    command: npm run dev
    networks:
      - bhackme-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bhackme-backend-dev
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://bhackme:secret@postgres:5432/bhackme
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-jwt-secret-change-in-production
      - DOCKER_SOCKET=/var/run/docker.sock
      - USER_CONTAINER_IMAGE=bhackme/terminal:latest
      - MAX_CONTAINERS=10
      - CONTAINER_TIMEOUT=3600
    depends_on:
      - postgres
      - redis
    command: npm run dev
    networks:
      - bhackme-net

  postgres:
    image: postgres:16-alpine
    container_name: bhackme-postgres-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=bhackme
      - POSTGRES_USER=bhackme
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bhackme-net

  redis:
    image: redis:7-alpine
    container_name: bhackme-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - bhackme-net
