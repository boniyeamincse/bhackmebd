version: '3.9'

networks:
  bhackme-net:
    driver: bridge
  terminal-net:
    driver: bridge
    internal: true  # No internet for user containers

volumes:
  postgres-data:
  redis-data:
  nginx-certs:
  certbot-www:
  uploads:

services:

  # ── Nginx Reverse Proxy ──────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bhackme-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - bhackme-net
    restart: always
    # Reload config every 6 h to pick up renewed certs
    command: >
      sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  # ── Certbot (Let's Encrypt auto-renewal) ─────────────
  certbot:
    image: certbot/certbot:latest
    container_name: bhackme-certbot
    volumes:
      - nginx-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Renew every 12 hours (certs expire after 90 days; renews at <30 days remaining)
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    restart: unless-stopped

  # ── Frontend (Next.js) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bhackme-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000
      - NEXT_PUBLIC_WS_URL=ws://backend:4000
    networks:
      - bhackme-net
    restart: unless-stopped

  # ── Backend (Node.js) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bhackme-backend
    environment:
      - DATABASE_URL=postgresql://bhackme:secret@postgres:5432/bhackme
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - DOCKER_SOCKET=/var/run/docker.sock
      - USER_CONTAINER_IMAGE=bhackme/terminal:latest
      - MAX_CONTAINERS=50
      - CONTAINER_TIMEOUT=3600
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - bhackme-net
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bhackme-postgres
    environment:
      - POSTGRES_DB=bhackme
      - POSTGRES_USER=bhackme
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bhackme-net
    restart: always

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bhackme-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - bhackme-net
    restart: always

  # ── User Terminal Container Image (Build only) ────────
  terminal-base:
    build:
      context: ./labs/terminal-base
      dockerfile: Dockerfile
    image: bhackme/terminal:latest
    profiles:
      - build-only
